<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gForms-Sentry | Exam Mode</title>
    <style>
        /* Minimalist & professional dark theme */
        :root {
            --bg-color: #0f172a;       /* Slate dark blue */
            --card-bg: #1e293b;        /* Lighter blue-gray for the card */
            --text-main: #f8fafc;      /* Crisp white for readability */
            --text-muted: #94a3b8;     /* Muted gray for secondary info */
            --accent: #4f46e5;         /* Modern indigo for focus */
            --accent-hover: #4338ca;   /* Darker indigo on press */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
        }

        /* Subtle secure shield icon logo */
        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.4);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Modern minimalist spinner */
        .spinner {
            width: 44px;
            height: 44px;
            border: 3.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 0 auto 16px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action button for manual fallback */
        .btn {
            display: none; /* Hidden by default */
            width: 100%;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            </svg>
        </div>
        
        <h1>Launching Exam Mode</h1>
        <p id="status-text">gForms-Sentry is opening your assignment. Please hold on a moment...</p>
        
        <div class="spinner" id="loading-spinner"></div>
        
        <a href="#" id="fallback-button" class="btn">Open in gForms-Sentry App</a>
        
        <div class="footer">
            🔒 STUDENT MODE ACTIVE &bull; GFORMS-SENTRY
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawInput = urlParams.get('id');
            
            // Intelligent extractor: Filters out the core Google Forms ID from any input
            function extractPureFormId(input) {
                if (!input) return null;
                // Case 1: Input is a complete Google Forms URL
                const match = input.match(/\/d\/e\/([a-zA-Z0-9-_]+)/) || input.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match) return match[1];
                // Case 2: Input is already the raw ID (sanity check on structure without slashes)
                if (input.length >= 20 && !input.includes('/')) return input;
                return null;
            }

            const cleanFormId = extractPureFormId(rawInput);

            // Halt execution if no valid ID can be resolved
            if (!cleanFormId) {
                document.getElementById('status-text').innerText = "Notice: No valid exam ID found. Please open the link directly from Google Classroom or scan your teacher's QR code.";
                document.getElementById('loading-spinner').style.display = 'none';
                return;
            }

            // Standardized Deep-Link structure consumed by the Flutter application
            const universalDeepLink = `intent://gforms-sentry.com/open?id=${cleanFormId}#Intent;scheme=https;package=com.example.gforms_sentry;end;`;
            
            // Prepare fallback action button
            const button = document.getElementById('fallback-button');
            button.href = universalDeepLink;

            // Trigger the Android Intent redirect automatically after a short delay
            setTimeout(() => {
                window.location.href = universalDeepLink;
            }, 500);

            // Safety net: Display manual launch option if automatic hook is blocked by browser policies
            setTimeout(() => {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('status-text').innerText = "If the gForms-Sentry app didn't open automatically, please click the button below to launch your exam:";
                button.style.display = 'block';
            }, 2500);
        };
    </script>

</body>
</html>
