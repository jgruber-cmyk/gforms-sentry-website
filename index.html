<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gForms-Sentry | Secure Google Forms Exams</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background-color: #ffffff;
            color: #1e293b;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-google:hover {
            background-color: #f1f5f9;
            transform: translateY(-1px);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secure Your Google Forms</h1>
        <p>Prevent students from leaving the exam, randomize questions, and monitor cheaters in real-time. Made by teachers, for teachers.</p>
        
        <button id="login-button" class="btn-google">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
    </div>

    <script>
        // Supabase-Client initialisieren
        const supabaseUrl = 'https://rrcigdmfzujwclpolcfu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyY2lnZG1menVqd2NscG9sY2Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjIzODAsImV4cCI6MjA5ODkzODM4MH0.C8UZzBtpxulOtRYciEZ7Rn6OCKe127wKtH_whHMdQ3w';
        
        // Erstellt die Verbindung zu deinem Supabase-Projekt
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Logik für den Google-Login Button
        document.getElementById('login-button').addEventListener('click', async () => {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Weiterleitung nach erfolgreichem Login auf dein GitHub Dashboard
                    redirectTo: 'https://jgruber-cmyk.github.io/gforms-sentry-website/dashboard.html'
                }
            });

            if (error) {
                alert('Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
